<div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl">
  <h1 class="text-2xl font-bold text-center text-slate-900 mb-8">
    Join Vendee today
  </h1>

  <form class="space-y-6">
    <div>
      <label
        class="block text-sm font-medium text-slate-700 mb-2"
        for="username"
      >
        Username
      </label>
      <input
        id="username"
        type="text"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-transparent outline-none"
        autocomplete="username"
        placeholder="johndoe"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2" for="email">
        Email
      </label>
      <input
        id="email"
        type="text"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-transparent outline-none"
        autocomplete="email"
        placeholder="johndoe@example.com"
      />
    </div>

    <div>
      <label
        class="block text-sm font-medium text-slate-700 mb-2"
        for="password"
      >
        Password
      </label>
      <input
        id="password"
        type="password"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-transparent outline-none"
        autocomplete="new-password"
        placeholder="********"
      />
    </div>

    <div>
      <label
        class="block text-sm font-medium text-slate-700 mb-2"
        for="password-confirm"
      >
        Confirm password
      </label>
      <input
        id="password-confirm"
        type="password"
        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:border-transparent outline-none"
        autocomplete="new-password"
        placeholder="********"
      />
    </div>

    <button appButton class="w-full">Continue</button>

    <p class="text-sm text-center textslate500 mt-4">
      Already have an account?
      <a
        class="text-slate-500 font-medium underline cursor-pointer"
        routerLink="/login"
      >
        Sign in</a
      >
    </p>
  </form>
</div>
